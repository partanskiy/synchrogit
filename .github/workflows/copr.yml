name: Update COPR

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v26.7.7)'
        required: true

permissions:
  contents: read

jobs:
  update-copr:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-24.04
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v6

      - name: Check COPR credentials
        id: creds
        env:
          COPR_CLI_CONFIG: ${{ secrets.COPR_CLI_CONFIG }}
        run: |
          if [[ -z "$COPR_CLI_CONFIG" ]]; then
            echo "COPR_CLI_CONFIG secret is not set; skipping COPR publishing"
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            install -dm700 ~/.config
            printf '%s\n' "$COPR_CLI_CONFIG" > ~/.config/copr
            chmod 600 ~/.config/copr
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        if: steps.creds.outputs.present == 'true'
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          dnf install -y --setopt=install_weak_deps=False git-core
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag_name="$INPUT_TAG"
            if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "tag input must look like vMAJOR.MINOR.PATCH[-pre][+build], got $tag_name" >&2
              exit 1
            fi
          else
            remote_url="https://github.com/${{ github.repository }}.git"
            head_sha="${{ github.event.workflow_run.head_sha }}"
            tag_name=$(
              git ls-remote --tags "$remote_url" 'refs/tags/v*.*.*' |
                awk -v sha="$head_sha" '$1 == sha && $2 ~ /\^\{\}$/ { sub(/^refs\/tags\//, "", $2); sub(/\^\{\}$/, "", $2); print $2 }' |
                sort -V |
                tail -n1
            )
          fi
          if [[ -z "$tag_name" ]]; then
            echo "could not resolve semver tag for workflow head sha" >&2
            exit 1
          fi
          if [[ "$tag_name" == *-* || "$tag_name" == *+* ]]; then
            echo "COPR publishing is skipped for prerelease/build-metadata tag $tag_name"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "pkgver=${tag_name#v}" >> "$GITHUB_OUTPUT"

      - name: Build SRPM and submit to COPR
        if: steps.creds.outputs.present == 'true' && steps.version.outputs.publish == 'true'
        env:
          PKGVER: ${{ steps.version.outputs.pkgver }}
        run: |
          dnf install -y --setopt=install_weak_deps=False rpm-build copr-cli curl
          workdir=$(mktemp -d)
          mkdir -p "$workdir"/{SOURCES,SPECS}

          sed \
            -e "s|@PKGVER@|$PKGVER|g" \
            -e "s|@CHANGELOG_DATE@|$(LC_ALL=C date '+%a %b %d %Y')|g" \
            packaging/copr/synchrogit.spec.in > "$workdir/SPECS/synchrogit.spec"

          curl -LfsS "https://github.com/${{ github.repository }}/archive/refs/tags/v${PKGVER}.tar.gz" \
            -o "$workdir/SOURCES/v${PKGVER}.tar.gz"

          rpmbuild --define "_topdir $workdir" -bs "$workdir/SPECS/synchrogit.spec"
          copr-cli --config ~/.config/copr build --nowait synchrogit "$workdir"/SRPMS/synchrogit-*.src.rpm
