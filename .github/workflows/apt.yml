name: Update APT repo

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v26.7.7); its GitHub release assets must already exist'
        required: true

permissions:
  contents: read

jobs:
  update-apt:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Prepare keys
        env:
          APT_SSH_PRIVATE_KEY: ${{ secrets.APT_SSH_PRIVATE_KEY }}
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          install -dm700 ~/.ssh
          printf '%s\n' "$APT_SSH_PRIVATE_KEY" > ~/.ssh/apt
          chmod 600 ~/.ssh/apt
          ssh-keyscan -t ed25519 github.com > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Resolve release tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag_name="$INPUT_TAG"
            if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "tag input must look like vMAJOR.MINOR.PATCH[-pre][+build], got $tag_name" >&2
              exit 1
            fi
          else
            remote_url="https://github.com/${{ github.repository }}.git"
            head_sha="${{ github.event.workflow_run.head_sha }}"
            tag_name=$(
              git ls-remote --tags "$remote_url" 'refs/tags/v*.*.*' |
                awk -v sha="$head_sha" '$1 == sha && $2 ~ /\^\{\}$/ { sub(/^refs\/tags\//, "", $2); sub(/\^\{\}$/, "", $2); print $2 }' |
                sort -V |
                tail -n1
            )
          fi
          if [[ -z "$tag_name" ]]; then
            echo "could not resolve semver tag for workflow head sha" >&2
            exit 1
          fi
          if [[ "$tag_name" == *-* || "$tag_name" == *+* ]]; then
            echo "APT publishing is skipped for prerelease/build-metadata tag $tag_name"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Download release .deb packages
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag_name }}
        run: |
          mkdir -p /tmp/debs
          gh release download "$TAG" -p '*.deb' -D /tmp/debs
          ls -l /tmp/debs

      - name: Regenerate and push the repo
        if: steps.version.outputs.publish == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag_name }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils
          ssh_cmd='ssh -i ~/.ssh/apt -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          workdir=$(mktemp -d)

          GIT_SSH_COMMAND="$ssh_cmd" git clone git@github.com:partanskiy/apt-repo.git "$workdir/repo"
          cp /tmp/debs/*.deb "$workdir/repo/"

          cd "$workdir/repo"
          dpkg-scanpackages --multiversion . > Packages
          gzip -kf9 Packages
          apt-ftparchive release . > Release
          gpg --batch --yes --digest-algo SHA256 --clearsign -o InRelease Release
          gpg --batch --yes --digest-algo SHA256 --armor --detach-sign -o Release.gpg Release

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes for apt repo"
            exit 0
          fi
          git commit -m "synchrogit ${TAG#v}"
          GIT_SSH_COMMAND="$ssh_cmd" git push origin HEAD:main
